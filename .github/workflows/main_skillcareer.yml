name: Build and deploy Node.js app to Azure Web App - skillcareer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # ✅ FIX: upload correct dist folder only
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # ✅ FIX: download into correct folder
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # 🔥 DEPLOY ONLY dist
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: skillcareer
          slot-name: Production
          package: dist
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8686F0BF54804C1A95EB1677DDA81CE7 }}
