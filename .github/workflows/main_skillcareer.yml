name: Build and deploy Node.js app to Azure Web App - skillcareer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      # 🔥 CLEAN + FULL INSTALL (fixes vite issue)
      - name: Install dependencies
        run: npm ci

      # 🔥 FIX: ensure vite binary is executable
      - name: Fix vite permissions
        run: chmod +x node_modules/.bin/vite

      # 🔥 BUILD FRONTEND
      - name: Build project
        run: npm run build

      # 🔥 Upload ONLY build output
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      # 🔥 DEPLOY TO AZURE APP SERVICE
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: skillcareer
          slot-name: Production
          package: dist
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8686F0BF54804C1A95EB1677DDA81CE7 }}
